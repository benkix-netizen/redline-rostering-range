<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>This Week — Redline Rostering Range</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0c;
    color: #fff;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }
  .page-wrap { max-width: 1200px; margin: 0 auto; }
  a.back { display: inline-block; margin-bottom: 1.5rem; font-size: 13px; color: #8a8a90; text-decoration: none; }
  a.back:hover { text-decoration: underline; }
  h1 { font-size: 22px; font-weight: 700; color: #e8e8ea; margin-bottom: 6px; }
  p.sub { font-size: 14px; color: #8a8a90; margin-bottom: 1.5rem; }
  .field-row { margin-bottom: 1.5rem; max-width: 320px; }
  .field-row label {
    display: block; font-size: 12px; font-weight: 600;
    color: #c8c8cc; margin-bottom: 6px;
    letter-spacing: 0.6px; text-transform: uppercase;
  }
  .field-row select {
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    background: #16161a; color: #fff; font-family: inherit; outline: none;
  }
  .field-row select:focus { border-color: #8a8a90; }
  .status-msg { font-size: 14px; color: #8a8a90; text-align: center; padding: 2rem 0; }
  .venues { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start; }
  .venue-col { flex: 1 1 320px; min-width: 280px; }
  .venue-title {
    font-size: 17px; font-weight: 700; padding-bottom: 8px;
    margin-bottom: 1rem; border-bottom: 2px solid;
    display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
  }
  .venue-col.lkf .venue-title { color: #FFD700; border-color: #FFD700; }
  .venue-col.discovery .venue-title { color: #ff8c42; border-color: #ff8c42; }
  .venue-col.events .venue-title { color: #ff4d6d; border-color: #ff4d6d; }
  .venue-col.neo .venue-title { color: #c6ff3d; border-color: #c6ff3d; }
  .cal-btn {
    font-size: 11px; font-weight: 700; padding: 6px 10px; border: 1px solid currentColor;
    border-radius: 6px; cursor: pointer; background: transparent; color: inherit;
    font-family: inherit; display: inline-flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .cal-btn:hover { opacity: 0.8; }
  .cal-btn.small { font-size: 10px; padding: 3px 8px; }
  .day-card {
    border-radius: 10px; padding: 0.9rem 1.1rem; margin-bottom: 0.75rem;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .venue-col.lkf .day-card { background: linear-gradient(160deg, #143d25, #0d2418); }
  .venue-col.discovery .day-card { background: linear-gradient(160deg, #3a2212, #1c1008); }
  .venue-col.events .day-card { background: linear-gradient(160deg, #3d1420, #240d16); }
  .venue-col.neo .day-card { background: linear-gradient(160deg, #3a1a66, #0d0710); }
  .day-card.cancelled { opacity: 0.5; }
  .day-title { font-size: 13px; font-weight: 600; color: #e8e8ea; margin-bottom: 6px; }
  .day-sub { font-size: 11px; color: #8a8a90; margin-bottom: 8px; margin-top: -4px; }
  .evt-cancelled-tag {
    font-size: 10px; font-weight: 700; color: #fecaca; border: 1px solid #ef4444;
    border-radius: 999px; padding: 1px 8px; margin-left: 6px;
  }
  .set-row {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    font-size: 13px; padding: 4px 0; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .set-row:first-of-type { border-top: none; }
  .set-row.mine { background: rgba(255,255,255,0.06); border-radius: 6px; padding-left: 8px; padding-right: 8px; }
  .set-row.dimmed { opacity: 0.4; }
  .set-info { display: flex; flex-direction: column; gap: 2px; }
  .set-time { color: #c8c8cc; }
  .set-dj { font-weight: 600; color: #fff; }
  .set-dj.unassigned { color: #6a6a70; font-weight: 400; font-style: italic; }
  .empty-note { font-size: 13px; color: #6a6a70; font-style: italic; }
</style>
</head>
<body>
  <div class="page-wrap">
    <a class="back" href="index.html"><i class="ti ti-arrow-left"></i> Back</a>
    <h1>This Week — All Venues</h1>
    <p class="sub">Everything scheduled across LKF Bar, Discovery Fusion BBQ, Special Events, and Neo in the next 7 days.</p>
    <div class="field-row">
      <label>Your name</label>
      <select id="dj-picker">
        <option value="">— None selected —</option>
      </select>
    </div>
    <div class="status-msg" id="status-msg"><i class="ti ti-loader"></i> Loading both rosters…</div>
    <div class="venues" id="venues" style="display:none"></div>
  </div>

<script>
  // Both venues' actual DJ assignments live on a per-month planning/invoice
  // grid tab, not the older flat "Roster" tab (which neither script's
  // generateRoster() keeps in sync with real assignments -- it's a dead
  // leftover of the DJ-facing display for both venues). tabName builds each
  // venue's own naming convention for that tab.
  const VENUES = [
    {
      key: "lkf", name: "LKF Bar", sheetId: "18k60OYTIlCBkWXOLs4rSb-NsxnWrjwNsQlfjnWpqZwA",
      tabName: (monthIdx, year) => `Roster - ${MONTHS[monthIdx]} ${year}`,
      organizerName: "LKF Bar"
    },
    {
      key: "discovery", name: "Discovery Fusion BBQ", sheetId: "1hgmPI32q6VIGeazKSpR6A_wzwP8l4sQqLMIlfZ2snng",
      tabName: (monthIdx, year) => `${MONTH_ABBR[monthIdx].toUpperCase()} ${String(year).slice(-2)}`,
      organizerName: "Discovery Fusion BBQ"
    }
  ];
  const ORGANIZER_EMAIL = "benki@redlineartistry.com";
  const TZ = "Australia/Melbourne";
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const MONTH_ABBR = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // Special Events lives on its own Sheet, in a flat one-row-per-slot tab
  // (not a per-month grid like the two venues), so it's fetched and rendered
  // through a separate path rather than being shoehorned into VENUES.
  const EVENTS_SHEET_ID = "1HTuwQ4KZ2-UnH6HvytPC4DIfl8nKWJjIwXJxL97fQaU";
  const EVENTS_SHEET_NAME = "Events";
  const EVENTS_AVAILABILITY_SHEET_NAME = "Availability";

  function parseCsv(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; }
          else { inQuotes = false; }
        } else {
          field += c;
        }
      } else if (c === '"') {
        inQuotes = true;
      } else if (c === ",") {
        row.push(field); field = "";
      } else if (c === "\n" || c === "\r") {
        if (c === "\r" && text[i + 1] === "\n") i++;
        row.push(field); field = "";
        rows.push(row); row = [];
      } else {
        field += c;
      }
    }
    if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(cell => cell !== ""));
  }

  // Each venue's per-month grid tab. Returns [] if that tab doesn't exist yet
  // -- gviz returns an HTML error page (not CSV) for a sheet name that
  // doesn't exist, which we treat as "nothing generated yet" rather than an
  // error.
  async function fetchCsvBySheetName(sheetId, name) {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}&headers=1&_=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) return [];
      const rows = parseCsv(await res.text());
      if (rows.length && /<html/i.test(rows[0][0] || "")) return [];
      return rows;
    } catch (err) {
      return [];
    }
  }

  function indexHeader(headerRow) {
    const idx = {};
    headerRow.forEach((h, i) => { idx[String(h).trim()] = i; });
    return idx;
  }

  // The Events tab's Date column is meant to be plain ISO text, but Sheets can
  // still auto-convert a cell into a real Date before Plain Text formatting
  // is applied -- gviz then exports that cell's locale-dependent display
  // string instead of literal ISO text. This normalizes whatever comes back
  // into canonical "yyyy-MM-dd".
  function normalizeDateStr(raw) {
    const s = String(raw || "").trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    let m = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/.exec(s);
    if (m) {
      let [, d, mo, y] = m;
      if (y.length === 2) y = (Number(y) < 70 ? "20" : "19") + y;
      return `${y}-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`;
    }
    const dt = new Date(s);
    if (!isNaN(dt.getTime())) {
      return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
    }
    return s;
  }

  async function fetchEventsRows() {
    const rows = await fetchCsvBySheetName(EVENTS_SHEET_ID, EVENTS_SHEET_NAME);
    if (rows.length < 2) return [];
    const idx = indexHeader(rows[0]);
    return rows.slice(1).map(r => ({
      date: normalizeDateStr(r[idx["Date"]]),
      label: (r[idx["Label"]] || "").trim(),
      location: (r[idx["Location"]] || "").trim(),
      status: (r[idx["Status"]] || "").trim(),
      role: (r[idx["Role"]] || "").trim(),
      start: (r[idx["Start"]] || "").trim(),
      end: (r[idx["End"]] || "").trim(),
      room: (r[idx["Room"]] || "").trim(),
      assigned: (r[idx["Assigned"]] || "").trim()
    })).filter(r => r.date && r.label && r.role);
  }

  // Neo lives on its own Sheet, in a hand-formatted week-by-week grid per
  // month (role-in-column-A, date-in-a-header-row) -- neither the two
  // venues' per-DJ grid shape nor Events' flat one-row-per-slot tab, so it
  // gets its own fetch/parse/render path too, mirroring the shape used by
  // neo-availability/roster.html.
  const NEO_SHEET_ID = "1hw_Pa2fzNC18LoXNs2BPZA1caFtNi2-gxE7wYj9AhXs";
  const NEO_ENTERTAINMENT_ROLES = ["MC", "Open", "Premain", "Main 1", "Main 2", "Close"];
  const NEO_MEDIA_ROLES = ["Photographer", "Social Media", "Videographer"];
  const NEO_ALL_ROLES = [...NEO_ENTERTAINMENT_ROLES, ...NEO_MEDIA_ROLES];

  function neoTabName(monthIdx, year) {
    return `${MONTH_ABBR[monthIdx].toUpperCase()} ${String(year).slice(-2)}`;
  }

  const NEO_DATE_CELL_RE = /^(\d{2})-([A-Za-z]{3})-(\d{2})$/;
  function parseNeoDateCell(cell) {
    const m = NEO_DATE_CELL_RE.exec(String(cell || "").trim());
    if (!m) return null;
    const day = parseInt(m[1], 10);
    const monthIdx = MONTH_ABBR.indexOf(m[2]);
    if (monthIdx === -1) return null;
    const year = 2000 + parseInt(m[3], 10);
    return `${year}-${String(monthIdx + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
  }

  // Same week-header / section-marker skipping approach as
  // neo-availability/roster.html's parseMonthGrid.
  function parseNeoMonthGrid(rows) {
    const slots = [];
    let currentDate = null;
    rows.forEach(r => {
      const a = (r[0] || "").trim();
      const b = (r[1] || "").trim();
      const c = (r[2] || "").trim();
      const d = (r[3] || "").trim();
      if (a === "" && b && b === c && c === d && parseNeoDateCell(b)) {
        currentDate = parseNeoDateCell(b);
        return;
      }
      if (!currentDate) return;
      if (NEO_ALL_ROLES.includes(a)) {
        slots.push({ date: currentDate, role: a, start: b, end: c, assigned: d });
      }
    });
    return slots;
  }

  function neoMonthMatches(rows, monthIdx, year) {
    const title = (rows[0] && rows[0][0] || "").trim();
    return title.toLowerCase() === `${MONTHS[monthIdx]} ${year}`.toLowerCase();
  }

  // Current + next month covers the 7-day window regardless of where in the
  // month "today" falls.
  async function fetchNeoSlots() {
    const now = new Date();
    const results = await Promise.all([0, 1].map(async offset => {
      const d = new Date(now.getFullYear(), now.getMonth() + offset, 1);
      const rows = await fetchCsvBySheetName(NEO_SHEET_ID, neoTabName(d.getMonth(), d.getFullYear()));
      if (rows.length === 0 || !neoMonthMatches(rows, d.getMonth(), d.getFullYear())) return [];
      return parseNeoMonthGrid(rows);
    }));
    return results.flat();
  }

  async function fetchNeoEmailMap() {
    const rows = await fetchCsvBySheetName(NEO_SHEET_ID, "Crew");
    const map = {};
    if (rows.length < 2) return map;
    const idx = indexHeader(rows[0]);
    rows.slice(1).forEach(r => {
      const name = (r[idx["Name"]] || "").trim();
      const email = (r[idx["Email"]] || "").trim();
      if (name && email) map[name] = email;
    });
    return map;
  }

  function buildNeoVevent(slot, name, email) {
    const startClock = parseClockFlexible(slot.start);
    if (!startClock) return null;
    const endClock = parseClockFlexible(slot.end) || { hour: (startClock.hour + 2) % 24, minute: startClock.minute };
    const startLocal = eventClockToDate(startClock, slot.date);
    const endLocal = eventClockToDate(endClock, slot.date);
    const uid = `${slot.date}-${slot.role}-${slot.start}-${icsEscape(name)}@neo.redlinerostering`.replace(/\s+/g, "");
    return [
      "BEGIN:VEVENT",
      `UID:${uid}`,
      `DTSTAMP:${icsDate(new Date())}`,
      `DTSTART:${icsDate(melbourneLocalToUtc(startLocal))}`,
      `DTEND:${icsDate(melbourneLocalToUtc(endLocal))}`,
      `SUMMARY:Neo — ${icsEscape(slot.role)}`,
      "LOCATION:Neo",
      email ? `ATTENDEE;CN=${icsEscape(name)};RSVP=TRUE:mailto:${email}` : "",
      "STATUS:CONFIRMED",
      "END:VEVENT"
    ].filter(Boolean).join("\r\n");
  }

  // Most recently submitted email on file per crew member, from Events' own
  // Availability tab -- same source events-availability/roster.html uses.
  async function fetchEventsEmailMap() {
    const rows = await fetchCsvBySheetName(EVENTS_SHEET_ID, EVENTS_AVAILABILITY_SHEET_NAME);
    const map = {};
    if (rows.length < 2) return map;
    const idx = indexHeader(rows[0]);
    rows.slice(1).forEach(r => {
      const name = (r[idx["Name"]] || "").trim();
      const email = (r[idx["Email"]] || "").trim();
      if (name && email) map[name] = email;
    });
    return map;
  }

  // Groups flat Events rows by Date+Label -- Date alone isn't a unique key,
  // since two events can land on the same date.
  function groupEventsByLabel(rows) {
    const byEvent = {};
    rows.forEach(r => {
      const key = r.date + "|" + r.label;
      if (!byEvent[key]) byEvent[key] = { date: r.date, label: r.label, location: r.location, status: r.status, slots: [] };
      byEvent[key].slots.push(r);
    });
    return Object.values(byEvent);
  }

  // Events' Start/End cells are plain 24h "HH:MM" text (unlike the venues'
  // pre-formatted 12h setTime ranges), so it needs its own clock parser.
  function parseClockFlexible(str) {
    str = String(str).trim();
    let m = /^(\d{1,2}):(\d{2})$/.exec(str);
    if (m) {
      const hour = parseInt(m[1], 10);
      const minute = parseInt(m[2], 10);
      if (hour >= 0 && hour <= 23) return { hour, minute };
    }
    m = /^(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/i.exec(str);
    if (m) {
      let hour = parseInt(m[1], 10) % 12;
      if (/pm/i.test(m[3])) hour += 12;
      return { hour, minute: m[2] ? parseInt(m[2], 10) : 0 };
    }
    return null;
  }

  function formatShortTime(str) {
    const clock = parseClockFlexible(str);
    if (!clock) return str;
    let h = clock.hour % 12;
    if (h === 0) h = 12;
    const suffix = clock.hour < 12 ? "am" : "pm";
    const mins = clock.minute ? ":" + String(clock.minute).padStart(2, "0") : "";
    return `${h}${mins}${suffix}`;
  }

  // Nightclub hours run ~6pm-6am; anything before 6am belongs to the day
  // after the event's Date. Shares melbourneLocalToUtc's {dayNum,monthIdx,
  // year,hour,minute} shape so no separate timezone conversion is needed.
  function eventClockToDate(clock, dateIso) {
    const [y, m, d] = dateIso.split("-").map(Number);
    const dayOffset = clock.hour < 6 ? 1 : 0;
    return { dayNum: d + dayOffset, monthIdx: m - 1, year: y, hour: clock.hour, minute: clock.minute };
  }

  function buildEventVevent(ev, slot, name, email) {
    const startClock = parseClockFlexible(slot.start);
    const endClock = parseClockFlexible(slot.end);
    if (!startClock || !endClock) return null;
    const startLocal = eventClockToDate(startClock, ev.date);
    const endLocal = eventClockToDate(endClock, ev.date);
    const uid = `${ev.date}-${slot.role}-${slot.start}-${slot.room}-${icsEscape(name)}@events.redlinerostering`.replace(/\s+/g, "");
    return [
      "BEGIN:VEVENT",
      `UID:${uid}`,
      `DTSTAMP:${icsDate(new Date())}`,
      `DTSTART:${icsDate(melbourneLocalToUtc(startLocal))}`,
      `DTEND:${icsDate(melbourneLocalToUtc(endLocal))}`,
      `SUMMARY:${icsEscape(ev.label)} — ${icsEscape(slot.role)}${slot.room ? " (" + icsEscape(slot.room) + ")" : ""}`,
      `LOCATION:${icsEscape(ev.location)}`,
      email ? `ATTENDEE;CN=${icsEscape(name)};RSVP=TRUE:mailto:${email}` : "",
      "STATUS:CONFIRMED",
      "END:VEVENT"
    ].filter(Boolean).join("\r\n");
  }

  function to12hLabel(hour, minute) {
    const period = hour >= 12 ? "pm" : "am";
    let h12 = hour % 12;
    if (h12 === 0) h12 = 12;
    return minute === 0 ? `${h12}${period}` : `${h12}:${String(minute).padStart(2, "0")}${period}`;
  }

  function parseTimeCell24(str) {
    const m = /^(\d{1,2}):(\d{2})/.exec(String(str).trim());
    if (!m) return null;
    return { hour: parseInt(m[1], 10), minute: parseInt(m[2], 10) };
  }

  // Title cell must actually match the requested month -- gviz silently
  // falls back to the spreadsheet's FIRST tab when a sheet name doesn't
  // exist, so a plain "did it error?" check isn't enough.
  function rosterMonthMatches(rows, monthLabel) {
    const title = (rows[0] && rows[0][0] || "").trim().toUpperCase();
    return title === monthLabel.toUpperCase();
  }

  // Parses a week-by-week planning grid: WEEK header rows, then one row per
  // set with real Start/Finish (or Start/End) time cells and an Assigned DJ
  // column, interleaved with filler rows this shape doesn't care about --
  // blank rows, WEEK headers, and (on Discovery's invoice-tab variant)
  // WEEKLY TOTAL/HOURS/AMOUNT rows between weeks, plus a trailing per-DJ
  // stats block after the last week. Any row whose first cell isn't a real
  // "Thursday, 2 July"-style date is simply skipped, not treated as the end
  // of the data -- LKF's grid has no such filler rows, but Discovery's does.
  function parseGridSlots(rows, requestedMonthIdx, requestedYear) {
    const slots = [];
    for (let i = 2; i < rows.length; i++) {
      const r = rows[i];
      const colA = (r[0] || "").trim();
      if (colA === "") continue;
      if (!colA.includes(",")) continue;

      const [dayName, datePart] = colA.split(",").map(s => s.trim());
      const dm = /^(\d{1,2})\s+([A-Za-z]+)$/.exec(datePart || "");
      if (!dm) continue;
      const dayNum = parseInt(dm[1], 10);
      const monthIdx = MONTHS.indexOf(dm[2]);
      if (monthIdx === -1) continue;
      const year = monthIdx < requestedMonthIdx ? requestedYear + 1 : requestedYear;

      const start = parseTimeCell24(r[1]);
      const end = parseTimeCell24(r[2]);
      if (!start || !end) continue;

      slots.push({
        dateLabel: `${dayNum} ${MONTH_ABBR[monthIdx]}`,
        day: dayName,
        setTime: `${to12hLabel(start.hour, start.minute)} – ${to12hLabel(end.hour, end.minute)}`,
        assignedDJ: (r[4] || "").trim(),
        dayNum, monthIdx, year
      });
    }
    return slots;
  }

  async function fetchVenueSlots(venue) {
    const now = new Date();
    const monthIdx = now.getMonth(), year = now.getFullYear();
    const monthLabel = `${MONTHS[monthIdx]} ${year}`;
    const rows = await fetchCsvBySheetName(venue.sheetId, venue.tabName(monthIdx, year));
    if (rows.length === 0 || !rosterMonthMatches(rows, monthLabel)) return [];
    return parseGridSlots(rows, monthIdx, year);
  }

  // Most recently submitted email on file for each DJ, read from the
  // venue's own Availability tab -- same source each venue's own roster.html
  // uses for calendar invites.
  async function fetchEmailMap(sheetId) {
    const rows = await fetchCsvBySheetName(sheetId, "Availability");
    const map = {};
    if (rows.length === 0) return map;
    const header = rows[0].map(h => String(h).trim());
    const nameIdx = header.indexOf("DJ name");
    const emailIdx = header.indexOf("Email");
    if (nameIdx === -1 || emailIdx === -1) return map;
    for (let i = 1; i < rows.length; i++) {
      const name = (rows[i][nameIdx] || "").trim();
      const email = (rows[i][emailIdx] || "").trim();
      if (name && email) map[name] = email; // later rows overwrite earlier ones (most recent wins)
    }
    return map;
  }

  function withinNextWeek(slot) {
    const slotDate = new Date(slot.year, slot.monthIdx, slot.dayNum);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const weekOut = new Date(today);
    weekOut.setDate(weekOut.getDate() + 7);
    return slotDate >= today && slotDate < weekOut;
  }

  function withinNextWeekIso(dateIso) {
    const today = new Date().toLocaleDateString("en-CA", { timeZone: TZ });
    const weekOutDate = new Date();
    weekOutDate.setDate(weekOutDate.getDate() + 7);
    const weekOut = weekOutDate.toLocaleDateString("en-CA", { timeZone: TZ });
    return dateIso >= today && dateIso < weekOut;
  }

  // --- Calendar export (.ics), adapted from each venue's own roster.html ---

  function parseClock12(str) {
    const m = /^(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/i.exec(str.trim());
    if (!m) return null;
    let hour = parseInt(m[1], 10) % 12;
    if (/pm/i.test(m[3])) hour += 12;
    return { hour, minute: m[2] ? parseInt(m[2], 10) : 0 };
  }

  // Nightclub hours run ~6pm-6am; anything before 6am belongs to the day after dayNum.
  function clockToDate(clock, dayNum, monthIdx, year) {
    const dayOffset = clock.hour < 6 ? 1 : 0;
    return { dayNum: dayNum + dayOffset, monthIdx, year, hour: clock.hour, minute: clock.minute };
  }

  function tzOffsetMinutes(date, timeZone) {
    const dtf = new Intl.DateTimeFormat("en-US", {
      timeZone, hourCycle: "h23",
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit"
    });
    const parts = Object.fromEntries(dtf.formatToParts(date).map(p => [p.type, p.value]));
    const asUTC = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second);
    return (asUTC - date.getTime()) / 60000;
  }

  function melbourneLocalToUtc({ dayNum, monthIdx, year, hour, minute }) {
    const guess = Date.UTC(year, monthIdx, dayNum, hour, minute);
    const offsetMin = tzOffsetMinutes(new Date(guess), TZ);
    return new Date(guess - offsetMin * 60000);
  }

  function parseSlotTimes(slot) {
    const [startStr, endStr] = slot.setTime.split(/[–-]/).map(s => s.trim());
    const startClock = parseClock12(startStr);
    const endClock = parseClock12(endStr);
    if (!startClock || !endClock) return null;
    const startLocal = clockToDate(startClock, slot.dayNum, slot.monthIdx, slot.year);
    const endLocal = clockToDate(endClock, slot.dayNum, slot.monthIdx, slot.year);
    return { start: melbourneLocalToUtc(startLocal), end: melbourneLocalToUtc(endLocal) };
  }

  function icsDate(date) {
    return date.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
  }

  function icsEscape(str) {
    return String(str).replace(/\\/g, "\\\\").replace(/,/g, "\\,").replace(/;/g, "\\;");
  }

  function slugify(str) {
    return String(str).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
  }

  function buildVevent(venue, slot, djName, djEmail) {
    const times = parseSlotTimes(slot);
    if (!times) return null;
    const uid = `${slot.year}${slot.monthIdx}${slot.dayNum}-${icsEscape(slot.setTime)}-${icsEscape(djName)}@${venue.key}.redlinerostering`;
    return [
      "BEGIN:VEVENT",
      `UID:${uid}`,
      `DTSTAMP:${icsDate(new Date())}`,
      `DTSTART:${icsDate(times.start)}`,
      `DTEND:${icsDate(times.end)}`,
      `SUMMARY:${icsEscape(venue.name)} — ${icsEscape(djName)} set`,
      `LOCATION:${icsEscape(venue.name)}`,
      `ORGANIZER;CN=${icsEscape(venue.organizerName)}:mailto:${ORGANIZER_EMAIL}`,
      `ATTENDEE;CN=${icsEscape(djName)};RSVP=TRUE:mailto:${djEmail}`,
      "STATUS:CONFIRMED",
      "END:VEVENT"
    ].join("\r\n");
  }

  function buildIcs(vevents) {
    return [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//Redline Rostering Range//Combined Roster//EN",
      "CALSCALE:GREGORIAN",
      ...vevents,
      "END:VCALENDAR"
    ].join("\r\n");
  }

  function downloadIcs(filename, vevents) {
    const blob = new Blob([buildIcs(vevents)], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  // --- Rendering, with optional per-DJ personalization ---

  let currentResults = []; // [{ venue, slots }]
  let currentEmailMaps = {}; // venue.key -> { djName: email }
  let eventsData = []; // [{ date, label, location, status, slots }]
  let eventsEmailMap = {};
  let neoSlots = [];
  let neoEmailMap = {}; // name -> email

  function renderEventsColumn(events, selectedDJ) {
    const col = document.createElement("div");
    col.className = "venue-col events";

    const mySlots = selectedDJ
      ? events.flatMap(ev => ev.slots.filter(s => s.assigned === selectedDJ).map(s => ({ ev, s })))
      : [];
    const email = selectedDJ ? eventsEmailMap[selectedDJ] : null;

    const titleWrap = document.createElement("div");
    titleWrap.className = "venue-title";
    titleWrap.innerHTML = `<span>Special Events</span>`;
    if (selectedDJ && mySlots.length > 0 && email) {
      const allBtn = document.createElement("button");
      allBtn.className = "cal-btn";
      allBtn.innerHTML = '<i class="ti ti-calendar-plus"></i> Add my sets';
      allBtn.onclick = () => {
        const vevents = mySlots.map(({ ev, s }) => buildEventVevent(ev, s, selectedDJ, email)).filter(Boolean);
        downloadIcs(`events-${slugify(selectedDJ)}-this-week.ics`, vevents);
      };
      titleWrap.appendChild(allBtn);
    }
    col.appendChild(titleWrap);

    if (events.length === 0) {
      const note = document.createElement("p");
      note.className = "empty-note";
      note.textContent = "Nothing scheduled in the next 7 days.";
      col.appendChild(note);
      return col;
    }

    events
      .slice()
      .sort((a, b) => a.date.localeCompare(b.date))
      .forEach(ev => {
        const [y, m, d] = ev.date.split("-").map(Number);
        const dateObj = new Date(y, m - 1, d);
        const day = dateObj.toLocaleDateString("en-AU", { weekday: "long" });
        const dateLabel = `${d} ${MONTH_ABBR[m - 1]}`;
        const cancelled = ev.status === "Cancelled";

        const card = document.createElement("div");
        card.className = "day-card" + (cancelled ? " cancelled" : "");
        card.innerHTML = `<div class="day-title">${ev.label}${cancelled ? '<span class="evt-cancelled-tag">Cancelled</span>' : ""}</div>` +
          `<div class="day-sub">${day}, ${dateLabel}${ev.location ? " · " + ev.location : ""}</div>`;

        ev.slots.forEach(slot => {
          const isMine = selectedDJ && slot.assigned === selectedDJ;
          const row = document.createElement("div");
          row.className = "set-row" + (isMine ? " mine" : selectedDJ ? " dimmed" : "");
          const djLabel = slot.assigned
            ? `<span class="set-dj">${slot.assigned}</span>`
            : `<span class="set-dj unassigned">Unassigned</span>`;
          row.innerHTML = `<div class="set-info"><span class="set-time">${slot.role} · ${formatShortTime(slot.start)}–${formatShortTime(slot.end)}${slot.room ? " (" + slot.room + ")" : ""}</span>${djLabel}</div>`;
          if (isMine) {
            if (email) {
              const btn = document.createElement("button");
              btn.className = "cal-btn small";
              btn.innerHTML = '<i class="ti ti-calendar-plus"></i> Add';
              btn.onclick = () => {
                const vevent = buildEventVevent(ev, slot, selectedDJ, email);
                if (vevent) downloadIcs(`${slugify(ev.label)}-${slugify(slot.role)}-${ev.date}.ics`, [vevent]);
              };
              row.appendChild(btn);
            } else {
              const note = document.createElement("span");
              note.style.fontSize = "11px";
              note.style.color = "#8a8a90";
              note.textContent = "No email on file";
              row.appendChild(note);
            }
          }
          card.appendChild(row);
        });
        col.appendChild(card);
      });

    return col;
  }

  function renderNeoColumn(slots, selectedDJ, neoEmailMap) {
    const col = document.createElement("div");
    col.className = "venue-col neo";

    const upcoming = slots.filter(s => withinNextWeekIso(s.date));
    const mySlots = selectedDJ ? upcoming.filter(s => s.assigned === selectedDJ) : [];
    const email = selectedDJ ? neoEmailMap[selectedDJ] : null;

    const titleWrap = document.createElement("div");
    titleWrap.className = "venue-title";
    titleWrap.innerHTML = `<span>Neo</span>`;
    if (selectedDJ && mySlots.length > 0 && email) {
      const allBtn = document.createElement("button");
      allBtn.className = "cal-btn";
      allBtn.innerHTML = '<i class="ti ti-calendar-plus"></i> Add my sets';
      allBtn.onclick = () => {
        const vevents = mySlots.map(s => buildNeoVevent(s, selectedDJ, email)).filter(Boolean);
        downloadIcs(`neo-${slugify(selectedDJ)}-this-week.ics`, vevents);
      };
      titleWrap.appendChild(allBtn);
    }
    col.appendChild(titleWrap);

    if (upcoming.length === 0) {
      const note = document.createElement("p");
      note.className = "empty-note";
      note.textContent = "Nothing scheduled in the next 7 days.";
      col.appendChild(note);
      return col;
    }

    const byDate = {};
    upcoming.forEach(s => {
      if (!byDate[s.date]) byDate[s.date] = [];
      byDate[s.date].push(s);
    });

    Object.keys(byDate).sort().forEach(date => {
      const [y, m, d] = date.split("-").map(Number);
      const dateObj = new Date(y, m - 1, d);
      const day = dateObj.toLocaleDateString("en-AU", { weekday: "long" });
      const dateLabel = `${d} ${MONTH_ABBR[m - 1]}`;

      const card = document.createElement("div");
      card.className = "day-card";
      card.innerHTML = `<div class="day-title">${day}, ${dateLabel}</div>`;

      byDate[date]
        .slice()
        .sort((a, b) => NEO_ALL_ROLES.indexOf(a.role) - NEO_ALL_ROLES.indexOf(b.role))
        .forEach(slot => {
          const isMine = selectedDJ && slot.assigned === selectedDJ;
          const row = document.createElement("div");
          row.className = "set-row" + (isMine ? " mine" : selectedDJ ? " dimmed" : "");
          const djLabel = slot.assigned
            ? `<span class="set-dj">${slot.assigned}</span>`
            : `<span class="set-dj unassigned">Unassigned</span>`;
          const timeText = slot.end ? `${formatShortTime(slot.start)}–${formatShortTime(slot.end)}` : formatShortTime(slot.start);
          row.innerHTML = `<div class="set-info"><span class="set-time">${slot.role} · ${timeText}</span>${djLabel}</div>`;
          if (isMine) {
            if (email) {
              const btn = document.createElement("button");
              btn.className = "cal-btn small";
              btn.innerHTML = '<i class="ti ti-calendar-plus"></i> Add';
              btn.onclick = () => {
                const vevent = buildNeoVevent(slot, selectedDJ, email);
                if (vevent) downloadIcs(`neo-${slugify(slot.role)}-${slot.date}.ics`, [vevent]);
              };
              row.appendChild(btn);
            } else {
              const note = document.createElement("span");
              note.style.fontSize = "11px";
              note.style.color = "#8a8a90";
              note.textContent = "No email on file";
              row.appendChild(note);
            }
          }
          card.appendChild(row);
        });
      col.appendChild(card);
    });

    return col;
  }

  function renderVenue(venue, slots, selectedDJ) {
    const col = document.createElement("div");
    col.className = `venue-col ${venue.key}`;

    const upcoming = slots.filter(withinNextWeek);
    const mySlots = selectedDJ ? upcoming.filter(s => s.assignedDJ === selectedDJ) : [];
    const email = selectedDJ ? currentEmailMaps[venue.key]?.[selectedDJ] : null;

    const titleWrap = document.createElement("div");
    titleWrap.className = "venue-title";
    titleWrap.innerHTML = `<span>${venue.name}</span>`;
    if (selectedDJ && mySlots.length > 0 && email) {
      const allBtn = document.createElement("button");
      allBtn.className = "cal-btn";
      allBtn.innerHTML = '<i class="ti ti-calendar-plus"></i> Add my sets';
      allBtn.onclick = () => {
        const vevents = mySlots.map(s => buildVevent(venue, s, selectedDJ, email)).filter(Boolean);
        downloadIcs(`${slugify(venue.name)}-${slugify(selectedDJ)}-this-week.ics`, vevents);
      };
      titleWrap.appendChild(allBtn);
    }
    col.appendChild(titleWrap);

    if (upcoming.length === 0) {
      const note = document.createElement("p");
      note.className = "empty-note";
      note.textContent = "Nothing scheduled in the next 7 days.";
      col.appendChild(note);
      return col;
    }

    const byDate = [];
    const seen = {};
    upcoming.forEach(slot => {
      const key = `${slot.dateLabel}-${slot.day}`;
      if (!(key in seen)) {
        seen[key] = byDate.length;
        byDate.push({ dateLabel: slot.dateLabel, day: slot.day, slots: [] });
      }
      byDate[seen[key]].slots.push(slot);
    });

    byDate.forEach(group => {
      const card = document.createElement("div");
      card.className = "day-card";
      card.innerHTML = `<div class="day-title">${group.day}, ${group.dateLabel}</div>`;
      group.slots.forEach(slot => {
        const isMine = selectedDJ && slot.assignedDJ === selectedDJ;
        const row = document.createElement("div");
        row.className = "set-row" + (isMine ? " mine" : selectedDJ ? " dimmed" : "");
        const djLabel = slot.assignedDJ
          ? `<span class="set-dj">${slot.assignedDJ}</span>`
          : `<span class="set-dj unassigned">Unassigned</span>`;
        row.innerHTML = `<div class="set-info"><span class="set-time">${slot.setTime}</span>${djLabel}</div>`;
        if (isMine) {
          if (email) {
            const btn = document.createElement("button");
            btn.className = "cal-btn small";
            btn.innerHTML = '<i class="ti ti-calendar-plus"></i> Add';
            btn.onclick = () => {
              const vevent = buildVevent(venue, slot, selectedDJ, email);
              if (vevent) downloadIcs(`${slugify(venue.name)}-${slugify(selectedDJ)}-${slugify(slot.dateLabel)}.ics`, [vevent]);
            };
            row.appendChild(btn);
          } else {
            const note = document.createElement("span");
            note.style.fontSize = "11px";
            note.style.color = "#8a8a90";
            note.textContent = "No email on file";
            row.appendChild(note);
          }
        }
        card.appendChild(row);
      });
      col.appendChild(card);
    });

    return col;
  }

  function renderAll(selectedDJ) {
    const container = document.getElementById("venues");
    container.innerHTML = "";
    currentResults.forEach(({ venue, slots }) => container.appendChild(renderVenue(venue, slots, selectedDJ)));
    container.appendChild(renderEventsColumn(eventsData, selectedDJ));
    container.appendChild(renderNeoColumn(neoSlots, selectedDJ, neoEmailMap));
  }

  function populateDjPicker() {
    const names = new Set();
    currentResults.forEach(({ slots }) => slots.forEach(s => { if (s.assignedDJ) names.add(s.assignedDJ); }));
    eventsData.forEach(ev => ev.slots.forEach(s => { if (s.assigned) names.add(s.assigned); }));
    neoSlots.forEach(s => { if (s.assigned) names.add(s.assigned); });
    const picker = document.getElementById("dj-picker");
    [...names].sort().forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      picker.appendChild(opt);
    });
    picker.addEventListener("change", () => renderAll(picker.value));
  }

  async function main() {
    const container = document.getElementById("venues");
    try {
      const [slotResults, emailMapResults, eventsRows, eventsEmails, neoSlotResults, neoEmails] = await Promise.all([
        Promise.all(VENUES.map(async venue => ({ venue, slots: await fetchVenueSlots(venue) }))),
        Promise.all(VENUES.map(async venue => ({ key: venue.key, map: await fetchEmailMap(venue.sheetId) }))),
        fetchEventsRows(),
        fetchEventsEmailMap(),
        fetchNeoSlots(),
        fetchNeoEmailMap()
      ]);

      currentResults = slotResults;
      emailMapResults.forEach(({ key, map }) => { currentEmailMaps[key] = map; });
      eventsData = groupEventsByLabel(eventsRows.filter(r => withinNextWeekIso(r.date)));
      eventsEmailMap = eventsEmails;
      neoSlots = neoSlotResults;
      neoEmailMap = neoEmails;

      document.getElementById("status-msg").style.display = "none";
      container.style.display = "flex";
      populateDjPicker();
      renderAll("");
    } catch (err) {
      console.error(err);
      document.getElementById("status-msg").textContent = "Couldn't load one or both rosters. Please try again shortly.";
    }
  }

  main();
</script>
</body>
