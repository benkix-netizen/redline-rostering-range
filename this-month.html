<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>This Month — Redline Rostering Range</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0c;
    color: #fff;
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
  }
  .page-wrap { max-width: 900px; margin: 0 auto; }
  a.back { display: inline-block; margin-bottom: 1.5rem; font-size: 13px; color: #8a8a90; text-decoration: none; }
  a.back:hover { text-decoration: underline; }
  h1 { font-size: 22px; font-weight: 700; color: #e8e8ea; margin-bottom: 6px; }
  p.sub { font-size: 14px; color: #8a8a90; margin-bottom: 2rem; }
  .status-msg { font-size: 14px; color: #8a8a90; text-align: center; padding: 2rem 0; }
  .venues { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start; }
  .venue-col { flex: 1 1 320px; min-width: 280px; }
  .venue-title {
    font-size: 17px; font-weight: 700; padding-bottom: 8px;
    margin-bottom: 1rem; border-bottom: 2px solid;
    position: sticky; top: 0; background: #0a0a0c;
  }
  .venue-col.lkf .venue-title { color: #FFD700; border-color: #FFD700; }
  .venue-col.discovery .venue-title { color: #ff8c42; border-color: #ff8c42; }
  .day-card {
    border-radius: 10px; padding: 0.9rem 1.1rem; margin-bottom: 0.75rem;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .venue-col.lkf .day-card { background: linear-gradient(160deg, #143d25, #0d2418); }
  .venue-col.discovery .day-card { background: linear-gradient(160deg, #3a2212, #1c1008); }
  .day-card.past { opacity: 0.45; }
  .day-title { font-size: 13px; font-weight: 600; color: #e8e8ea; margin-bottom: 6px; }
  .set-row {
    display: flex; justify-content: space-between; gap: 10px;
    font-size: 13px; padding: 4px 0; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .set-row:first-of-type { border-top: none; }
  .set-time { color: #c8c8cc; }
  .set-dj { font-weight: 600; color: #fff; }
  .set-dj.unassigned { color: #6a6a70; font-weight: 400; font-style: italic; }
  .empty-note { font-size: 13px; color: #6a6a70; font-style: italic; }
</style>
</head>
<body>
  <div class="page-wrap">
    <a class="back" href="index.html"><i class="ti ti-arrow-left"></i> Back</a>
    <h1 id="page-title">This Month — Both Venues</h1>
    <p class="sub">Every set scheduled this month across LKF Bar and Discovery Fusion BBQ. Past dates are dimmed.</p>
    <div class="status-msg" id="status-msg"><i class="ti ti-loader"></i> Loading both rosters…</div>
    <div class="venues" id="venues" style="display:none"></div>
  </div>

<script>
  const VENUES = [
    { key: "lkf", name: "LKF Bar", sheetId: "18k60OYTIlCBkWXOLs4rSb-NsxnWrjwNsQlfjnWpqZwA", kind: "grid" },
    { key: "discovery", name: "Discovery Fusion BBQ", sheetId: "1hgmPI32q6VIGeazKSpR6A_wzwP8l4sQqLMIlfZ2snng", kind: "flat" }
  ];
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const MONTH_ABBR = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  function parseCsv(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; }
          else { inQuotes = false; }
        } else {
          field += c;
        }
      } else if (c === '"') {
        inQuotes = true;
      } else if (c === ",") {
        row.push(field); field = "";
      } else if (c === "\n" || c === "\r") {
        if (c === "\r" && text[i + 1] === "\n") i++;
        row.push(field); field = "";
        rows.push(row); row = [];
      } else {
        field += c;
      }
    }
    if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(cell => cell !== ""));
  }

  // Discovery's flat "Roster" tab: fixed name, current operational month lives
  // in a "Month: <Month> <Year>" header cell.
  async function fetchRosterRows(sheetId) {
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Roster&headers=1&_=${Date.now()}`;
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error(`Sheet fetch failed (${res.status})`);
    return parseCsv(await res.text());
  }

  // LKF's per-month "Roster - <Month Year>" grid tab. Returns [] if that tab
  // doesn't exist yet -- gviz returns an HTML error page (not CSV) for a
  // sheet name that doesn't exist, which we treat as "nothing generated yet"
  // rather than an error.
  async function fetchCsvBySheetName(sheetId, name) {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}&headers=1&_=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) return [];
      const rows = parseCsv(await res.text());
      if (rows.length && /<html/i.test(rows[0][0] || "")) return [];
      return rows;
    } catch (err) {
      return [];
    }
  }

  function indexHeader(headerRow) {
    const idx = {};
    headerRow.forEach((name, i) => { idx[name.trim()] = i; });
    return idx;
  }

  function parseRosterSlots(rows) {
    const m = /^Month:\s*([A-Za-z]+)\s+(\d{4})/.exec((rows[0][0] || "").trim());
    if (!m) throw new Error("Couldn't find 'Month: <Month> <Year>' header in Roster tab.");
    const monthIdx = MONTHS.indexOf(m[1]);
    const year = parseInt(m[2], 10);

    const idx = indexHeader(rows[1]);
    const DATE_COL = 0; // gviz can strip this header cell's text, so use its fixed position
    const slots = [];
    for (let i = 2; i < rows.length; i++) {
      const r = rows[i];
      const dateLabel = (r[DATE_COL] || "").trim();
      if (!dateLabel) continue;
      const dayNum = parseInt(dateLabel, 10);
      if (Number.isNaN(dayNum)) continue;

      const setTime = idx["Set Time"] > -1
        ? (r[idx["Set Time"]] || "").trim()
        : `${(r[idx["Start"]] || "").trim()} – ${(r[idx["End"]] || "").trim()}`;

      slots.push({
        dateLabel,
        day: (r[idx["Day"]] || "").trim(),
        setTime,
        assignedDJ: (r[idx["Assigned DJ"]] || "").trim(),
        dayNum, monthIdx, year
      });
    }
    return { monthIdx, year, slots };
  }

  function to12hLabel(hour, minute) {
    const period = hour >= 12 ? "pm" : "am";
    let h12 = hour % 12;
    if (h12 === 0) h12 = 12;
    return minute === 0 ? `${h12}${period}` : `${h12}:${String(minute).padStart(2, "0")}${period}`;
  }

  function parseTimeCell24(str) {
    const m = /^(\d{1,2}):(\d{2})/.exec(String(str).trim());
    if (!m) return null;
    return { hour: parseInt(m[1], 10), minute: parseInt(m[2], 10) };
  }

  // Title cell must actually match the requested month -- gviz silently
  // falls back to the spreadsheet's FIRST tab when a sheet name doesn't
  // exist, so a plain "did it error?" check isn't enough.
  function rosterMonthMatches(rows, monthLabel) {
    const title = (rows[0] && rows[0][0] || "").trim().toUpperCase();
    return title === monthLabel.toUpperCase();
  }

  // Parses LKF's week-by-week planning grid: WEEK header rows, then one row
  // per set with real Start/Finish time cells and an Assigned DJ dropdown,
  // followed by a trailing per-DJ stats block. Stops as soon as a row
  // doesn't look like a week header or a date row ("Thursday, 2 July"),
  // which is exactly where that stats block begins.
  function parseGridSlots(rows, requestedMonthIdx, requestedYear) {
    const slots = [];
    for (let i = 2; i < rows.length; i++) {
      const r = rows[i];
      const colA = (r[0] || "").trim();
      if (colA === "") continue;
      if (/^WEEK\s+\d+$/i.test(colA)) continue;
      if (!colA.includes(",")) break;

      const [dayName, datePart] = colA.split(",").map(s => s.trim());
      const dm = /^(\d{1,2})\s+([A-Za-z]+)$/.exec(datePart || "");
      if (!dm) continue;
      const dayNum = parseInt(dm[1], 10);
      const monthIdx = MONTHS.indexOf(dm[2]);
      if (monthIdx === -1) continue;
      const year = monthIdx < requestedMonthIdx ? requestedYear + 1 : requestedYear;

      const start = parseTimeCell24(r[1]);
      const end = parseTimeCell24(r[2]);
      if (!start || !end) continue;

      slots.push({
        dateLabel: `${dayNum} ${MONTH_ABBR[monthIdx]}`,
        day: dayName,
        setTime: `${to12hLabel(start.hour, start.minute)} – ${to12hLabel(end.hour, end.minute)}`,
        assignedDJ: (r[4] || "").trim(),
        dayNum, monthIdx, year
      });
    }
    return slots;
  }

  async function fetchVenueData(venue) {
    if (venue.kind === "grid") {
      const now = new Date();
      const monthIdx = now.getMonth(), year = now.getFullYear();
      const monthLabel = `${MONTHS[monthIdx]} ${year}`;
      const rows = await fetchCsvBySheetName(venue.sheetId, `Roster - ${monthLabel}`);
      if (rows.length === 0 || !rosterMonthMatches(rows, monthLabel)) {
        return { monthIdx, year, slots: [] };
      }
      return { monthIdx, year, slots: parseGridSlots(rows, monthIdx, year) };
    }
    const rows = await fetchRosterRows(venue.sheetId);
    return parseRosterSlots(rows);
  }

  function isPast(slot) {
    const slotDate = new Date(slot.year, slot.monthIdx, slot.dayNum);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return slotDate < today;
  }

  function renderVenue(venue, monthIdx, year, slots) {
    const col = document.createElement("div");
    col.className = `venue-col ${venue.key}`;
    col.innerHTML = `<div class="venue-title">${venue.name} — ${MONTHS[monthIdx]} ${year}</div>`;

    if (slots.length === 0) {
      const note = document.createElement("p");
      note.className = "empty-note";
      note.textContent = "Nothing scheduled this month.";
      col.appendChild(note);
      return col;
    }

    const byDate = [];
    const seen = {};
    slots.forEach(slot => {
      // Includes monthIdx -- a per-month grid tab can contain trailing/leading
      // nights from an adjacent month, whose dayNum could otherwise collide
      // with a same-numbered day in this tab's own nominal month.
      const key = `${slot.year}-${slot.monthIdx}-${slot.dayNum}-${slot.day}`;
      if (!(key in seen)) {
        seen[key] = byDate.length;
        byDate.push({ dateLabel: slot.dateLabel, day: slot.day, dateObj: new Date(slot.year, slot.monthIdx, slot.dayNum), slots: [] });
      }
      byDate[seen[key]].slots.push(slot);
    });
    byDate.sort((a, b) => a.dateObj - b.dateObj);

    byDate.forEach(group => {
      const card = document.createElement("div");
      card.className = "day-card" + (isPast(group.slots[0]) ? " past" : "");
      card.innerHTML = `<div class="day-title">${group.day}, ${group.dateLabel}</div>`;
      group.slots.forEach(slot => {
        const row = document.createElement("div");
        row.className = "set-row";
        const djLabel = slot.assignedDJ
          ? `<span class="set-dj">${slot.assignedDJ}</span>`
          : `<span class="set-dj unassigned">Unassigned</span>`;
        row.innerHTML = `<span class="set-time">${slot.setTime}</span>${djLabel}`;
        card.appendChild(row);
      });
      col.appendChild(card);
    });

    return col;
  }

  async function main() {
    const container = document.getElementById("venues");
    try {
      const results = await Promise.all(VENUES.map(async venue => {
        const data = await fetchVenueData(venue);
        return { venue, ...data };
      }));

      document.getElementById("status-msg").style.display = "none";
      container.style.display = "flex";
      results.forEach(({ venue, monthIdx, year, slots }) =>
        container.appendChild(renderVenue(venue, monthIdx, year, slots)));
    } catch (err) {
      console.error(err);
      document.getElementById("status-msg").textContent = "Couldn't load one or both rosters. Please try again shortly.";
    }
  }

  main();
</script>
</body>
</html>
